services:

  cassandra:
    image: cassandra:5.0
    container_name: cassandra
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
      MINIO_DEFAULT_BUCKETS: lakehouse
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  web:
    build: ./resources/web
    container_name: web
    ports:
      - "5001:5001"
    environment:
      CASSANDRA_HOST: "cassandra"
      KAFKA_BROKER: "kafka:9092"
      PROJECT_HOME: "/app"
    depends_on:
      - cassandra
      - kafka

  spark-master:
    image: apache/spark:4.1.1-scala2.13-java21-python3-r-ubuntu
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker-1:
    image: apache/spark:4.1.1-scala2.13-java21-python3-r-ubuntu
    container_name: spark-worker-1
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./models:/app/models
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  spark-worker-2:
    image: apache/spark:4.1.1-scala2.13-java21-python3-r-ubuntu
    container_name: spark-worker-2
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./models:/app/models
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
  # Job de prediccion. Solo arranca bajo demanda (perfil "job"), una vez
  # que los datos, topics y modelos estan listos:
  #   docker compose --profile job up -d spark-job
  spark-job:
    image: apache/spark:4.1.1-scala2.13-java21-python3-r-ubuntu
    container_name: spark-job
    profiles: ["job"]
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
      - kafka
      - cassandra
    volumes:
      - ./flight_prediction/target/scala-2.13:/app/jar
      - ./models:/app/models
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - KAFKA_BROKER=kafka:9092
      - CASSANDRA_HOST=cassandra
      - BASE_PATH=/app
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --conf spark.jars.ivy=/tmp/.ivy2
      --packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.1,com.datastax.oss:java-driver-core:4.17.0
      --class es.upm.dit.ging.predictor.MakePrediction
      /app/jar/flight_prediction_2.13-0.1.jar

volumes:
  minio_data: