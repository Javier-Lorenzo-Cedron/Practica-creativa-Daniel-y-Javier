services:

  cassandra:
    image: cassandra:5.0
    container_name: cassandra
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 15

  cassandra-init:
    image: python:3.11-slim
    container_name: cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./:/app
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      pip install --no-cache-dir cassandra-driver &&
      python /app/resources/init_cassandra.py
      "

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
      MINIO_DEFAULT_BUCKETS: lakehouse
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      - minio
    restart: "no"
    volumes:
      - ./data:/minio-data
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      sleep 8;
      mc alias set local http://minio:9000 admin admin123;
      mc mb --ignore-existing local/lakehouse;
      mc cp /minio-data/simple_flight_delay_features.jsonl.bz2 local/lakehouse/raw/simple_flight_delay_features.jsonl.bz2;
      mc ls local/lakehouse/raw/;
      "

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-init:
    image: apache/kafka:4.2.0
    container_name: kafka-init
    depends_on:
      - kafka
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      sleep 15;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic flight-delay-ml-request;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic flight-delay-ml-response;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list;
      "

  web:
    build: ./resources/web
    container_name: web
    ports:
      - "5001:5001"
    environment:
      CASSANDRA_HOST: "cassandra"
      KAFKA_BROKER: "kafka:9092"
      PROJECT_HOME: "/app"
    restart: on-failure
    depends_on:
      cassandra:
        condition: service_healthy
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      cassandra-init:
        condition: service_completed_successfully

  spark-master:
    image: apache/spark:4.1.1-scala2.13-java21-python3-r-ubuntu
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker-1:
    image: apache/spark:4.1.1-scala2.13-java21-python3-r-ubuntu
    container_name: spark-worker-1
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./models:/app/models
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  spark-worker-2:
    image: apache/spark:4.1.1-scala2.13-java21-python3-r-ubuntu
    container_name: spark-worker-2
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./models:/app/models
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  iceberg-init:
    build:
      context: .
      dockerfile: Dockerfile.spark-train
    container_name: iceberg-init
    depends_on:
      spark-master:
        condition: service_started
      spark-worker-1:
        condition: service_started
      spark-worker-2:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    working_dir: /opt/project
    volumes:
      - ./:/opt/project
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=admin123
      - MINIO_BUCKET=lakehouse
    restart: "no"
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --deploy-mode client
      --conf spark.jars.ivy=/tmp/.ivy2
      --packages org.apache.iceberg:iceberg-spark-runtime-4.1_2.13:1.11.0,org.apache.hadoop:hadoop-aws:3.4.1
      spark_iceberg.py

  # Job de prediccion. Solo arranca bajo demanda (perfil "job"), una vez
  # que los datos, topics y modelos estan listos:
  #   docker compose --profile job up -d spark-job
  spark-job:
    build:
      context: .
      dockerfile: Dockerfile.spark-job
    container_name: spark-job
    profiles: ["job"]
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
      - kafka
      - cassandra
      - kafka-init
      - cassandra-init
      - iceberg-init
    volumes:
      - ./flight_prediction/target/scala-2.13:/app/jar
      - ./models:/app/models
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - KAFKA_BROKER=kafka:9092
      - CASSANDRA_HOST=cassandra
      - BASE_PATH=s3a://lakehouse
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=admin123
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --conf spark.jars.ivy=/opt/ivy
      --packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.1,com.datastax.oss:java-driver-core:4.17.0,org.apache.hadoop:hadoop-aws:3.4.1
      --exclude-packages org.wildfly.openssl:wildfly-openssl
      --class es.upm.dit.ging.predictor.MakePrediction
      /app/jar/flight_prediction_2.13-0.1.jar

  spark-train:
    build:
      context: .
      dockerfile: Dockerfile.spark-train
    container_name: spark-train
    profiles: ["train"]
    depends_on:
      spark-master:
        condition: service_started
      spark-worker-1:
        condition: service_started
      spark-worker-2:
        condition: service_started
      iceberg-init:
        condition: service_completed_successfully
    volumes:
      - ./resources:/opt/spark-apps/resources
      - ./models:/app/models
      - ./:/opt/project
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=admin123
      - LOCAL_MODELS_PATH=/app/models
    working_dir: /opt/project
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --deploy-mode client
      --conf spark.jars.ivy=/tmp/.ivy2
      --packages org.apache.iceberg:iceberg-spark-runtime-4.1_2.13:1.11.0,org.apache.hadoop:hadoop-aws:3.4.1
      resources/train_spark_mllib_model.py .
    
volumes:
  minio_data:
